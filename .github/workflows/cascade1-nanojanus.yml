name: "Cascade 1: NanoJanus"

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_run:
    workflows: ["Cascade 1: Molequla"]
    types: [completed]
  workflow_dispatch:

jobs:
  nanojanus:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/janus
        path: janus-src

    - name: Set date
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        echo "DATESTAMP=$DATESTAMP" >> $GITHUB_ENV

    - name: Generate 12 words
      run: |
        C1="cascade/cascade1"
        mkdir -p "$C1/nanojanus-lab"

        HAIKU=$(cat "$C1/haiku-lab/${DATESTAMP}.txt" 2>/dev/null | tr '\n' ' ')
        PENELOPE=$(cat "$C1/penelope-lab/${DATESTAMP}.txt" 2>/dev/null)
        MOLEQULA=$(cat "$C1/molequla-lab/${DATESTAMP}/clean_output.txt" 2>/dev/null | head -5 | tr '\n' ' ')

        INPUT="${HAIKU} ${PENELOPE} ${MOLEQULA}"
        INPUT=$(echo "$INPUT" | sed 's/^[[:space:]]*//' | cut -c1-500)

        if [ -z "$(echo $INPUT | tr -d ' ')" ]; then
          echo "No input from previous organisms. Using genesis."
          INPUT=$(cat "$C1/genesis.txt")
        fi

        echo "Input: $INPUT"

        RAW=$(python3 janus-src/nanojanus.py --weights janus-src/weights/nanojanus.bin --generate "$INPUT" 2>&1)
        echo "$RAW" > "$C1/nanojanus-lab/${DATESTAMP}_raw.txt"

        # Extract words from bidirectional chain (lines with ^N or vN prefix)
        WORDS=$(echo "$RAW" | grep -E '^\s+[\^v]' | awk '{print $2}' | head -12 | tr '\n' ' ')
        [ -z "$WORDS" ] && WORDS=$(echo "$RAW" | grep -oE '\b[a-z]{3,}\b' | grep -v 'debt' | grep -v 'drift' | grep -v 'params' | head -12 | tr '\n' ' ')

        echo "$WORDS" > "$C1/nanojanus-lab/${DATESTAMP}.txt"
        echo "=== NanoJanus 12 words ===" && cat "$C1/nanojanus-lab/${DATESTAMP}.txt"

    - name: Update cascade state
      run: |
        C1="cascade/cascade1"
        cat >> "$C1/cascade.md" <<EOF

---

## ${DATESTAMP}

**seed:** $(cat "$C1/seed/${DATESTAMP}.txt" 2>/dev/null | head -1 | cut -c1-200)

**haiku:**
$(cat "$C1/haiku-lab/${DATESTAMP}.txt" 2>/dev/null)

**penelope:** $(cat "$C1/penelope-lab/${DATESTAMP}.txt" 2>/dev/null)

**molequla:** $(wc -l "$C1/molequla-lab/${DATESTAMP}/"*.log 2>/dev/null | tail -1 || echo "no logs")

**nanojanus:** $(cat "$C1/nanojanus-lab/${DATESTAMP}.txt" 2>/dev/null)
EOF

    - name: Push
      run: |
        git config user.name "Cascade 1: NanoJanus"
        git config user.email "nanojanus@ariannamethod.org"
        git add cascade/cascade1/ || true
        git diff --cached --quiet || git commit -m "cascade1/nanojanus: ${DATESTAMP}"
        git push || (git pull --rebase origin main && git push) || true
