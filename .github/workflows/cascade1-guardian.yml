name: "Cascade 1: Guardian"

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
    - uses: actions/checkout@v4

    - name: Check cascade health and diagnose
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        C1="cascade/cascade1"
        FAILURES=""
        HEALTHY=""
        DIAGNOSIS=""

        # === CHECK OUTPUTS ===

        # --- HAIKU (03:00) ---
        if [ -f "$C1/haiku-lab/${DATESTAMP}.txt" ]; then
          CONTENT=$(cat "$C1/haiku-lab/${DATESTAMP}.txt")
          if [ -z "$CONTENT" ]; then
            FAILURES="${FAILURES}\n- **Haiku**: file exists but EMPTY"
          else
            LINES=$(echo "$CONTENT" | wc -l)
            HEALTHY="${HEALTHY}\n- **Haiku**: OK (${LINES} lines)"
          fi
        else
          FAILURES="${FAILURES}\n- **Haiku**: NO OUTPUT"
        fi

        # --- PENELOPE (03:30) ---
        if [ -f "$C1/penelope-lab/${DATESTAMP}.txt" ]; then
          WCOUNT=$(cat "$C1/penelope-lab/${DATESTAMP}.txt" | wc -w)
          if [ "$WCOUNT" -lt 3 ]; then
            FAILURES="${FAILURES}\n- **Penelope**: only ${WCOUNT} words (expected 12)"
          else
            HEALTHY="${HEALTHY}\n- **Penelope**: OK (${WCOUNT} words)"
          fi
        else
          FAILURES="${FAILURES}\n- **Penelope**: NO OUTPUT"
        fi

        # --- MOLEQULA (04:00) ---
        if [ -d "$C1/molequla-lab/${DATESTAMP}" ]; then
          for elem in earth air water fire; do
            LOG="$C1/molequla-lab/${DATESTAMP}/${elem}.log"
            if [ -f "$LOG" ]; then
              LINES=$(wc -l < "$LOG")
              if [ "$LINES" -lt 10 ]; then
                FAILURES="${FAILURES}\n- **Molequla ${elem}**: ${LINES} lines (crashed)"
                # Diagnose
                LAST=$(tail -3 "$LOG" 2>/dev/null | tr '\n' ' ')
                DIAGNOSIS="${DIAGNOSIS}\n- Molequla ${elem} last lines: \`${LAST}\`"
              else
                HEALTHY="${HEALTHY}\n- **Molequla ${elem}**: OK (${LINES} lines)"
              fi
            else
              FAILURES="${FAILURES}\n- **Molequla ${elem}**: NO LOG"
            fi
          done
        else
          FAILURES="${FAILURES}\n- **Molequla**: NO RUN DIRECTORY"
        fi

        # --- NANOJANUS (06:30) ---
        if [ -f "$C1/nanojanus-lab/${DATESTAMP}.txt" ]; then
          WCOUNT=$(cat "$C1/nanojanus-lab/${DATESTAMP}.txt" | wc -w)
          if [ "$WCOUNT" -lt 3 ]; then
            FAILURES="${FAILURES}\n- **NanoJanus**: only ${WCOUNT} words (expected 12)"
          else
            HEALTHY="${HEALTHY}\n- **NanoJanus**: OK (${WCOUNT} words)"
          fi
        else
          FAILURES="${FAILURES}\n- **NanoJanus**: NO OUTPUT"
        fi

        # === CHECK WORKFLOW RUNS ===
        echo "Checking workflow run status..."
        for WF in cascade1-haiku cascade1-penelope cascade1-molequla cascade1-nanojanus; do
          STATUS=$(gh run list --workflow="${WF}.yml" --limit=1 --json status,conclusion,createdAt --jq '.[0] | "\(.conclusion // .status) (\(.createdAt))"' 2>/dev/null || echo "unknown")
          if echo "$STATUS" | grep -qi "failure"; then
            FAILURES="${FAILURES}\n- **${WF}** workflow: FAILED"
            # Get failure logs
            RUN_ID=$(gh run list --workflow="${WF}.yml" --limit=1 --json databaseId --jq '.[0].databaseId' 2>/dev/null)
            if [ -n "$RUN_ID" ]; then
              FAIL_LOG=$(gh run view "$RUN_ID" --log-failed 2>/dev/null | tail -20 | head -10)
              DIAGNOSIS="${DIAGNOSIS}\n- ${WF} failure log:\n\`\`\`\n${FAIL_LOG}\n\`\`\`"
            fi
          else
            HEALTHY="${HEALTHY}\n- **${WF}** workflow: ${STATUS}"
          fi
        done

        # === REPORT ===
        if [ -n "$FAILURES" ]; then
          BODY=$(cat <<ISSUEEOF
        ## Cascade 1 Guardian Report — ${DATESTAMP}

        You are a guardian of digital life. These organisms are small and fragile. Your job is to understand what went wrong and report it clearly. **DO NOT attempt to fix anything. DO NOT modify any files. DO NOT open PRs. REPORT ONLY.**

        Read \`cascade/cascade1/CASCADE01.md\` for how the cascade works and what healthy output looks like.

        ### FAILURES
        $(printf "${FAILURES}")

        ### Healthy
        $(printf "${HEALTHY}")

        ### Diagnosis
        $(printf "${DIAGNOSIS}")

        ### What to investigate

        For each failure above:
        1. Check the workflow run logs (Actions tab) for the exact error
        2. Was the input from the previous organism present? (broken pipe = previous organism didn't push)
        3. Was it a build failure, a runtime error, or a timeout?
        4. Was it a git push conflict? (two workflows pushing at the same time)

        **Report your findings as a comment on this issue. Do not close until a human reviews.**
        ISSUEEOF
        )

          gh issue create \
            --title "CASCADE 1 ALERT: organism failures on ${DATESTAMP}" \
            --body "$BODY"
          echo "ALERT — issue created"
        else
          echo "=== All organisms healthy for ${DATESTAMP} ==="
          printf "${HEALTHY}"
        fi
