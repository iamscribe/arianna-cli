name: "Cascade 1: Haiku"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  haiku:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/haiku.c
        path: haiku-src

    - name: Build Haiku
      working-directory: haiku-src
      run: cc haiku.c -O2 -lm -o haiku && ls -lh haiku

    - name: Prepare seed
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d 2>/dev/null || echo "")
        echo "DATESTAMP=$DATESTAMP" >> $GITHUB_ENV
        C1="cascade/cascade1"
        mkdir -p "$C1/seed" "$C1/haiku-lab"

        SEED=""
        if [ -n "$YESTERDAY" ]; then
          NJ=""; PEN=""
          [ -f "$C1/nanojanus-lab/${YESTERDAY}.txt" ] && NJ=$(cat "$C1/nanojanus-lab/${YESTERDAY}.txt")
          [ -f "$C1/penelope-lab/${YESTERDAY}.txt" ] && PEN=$(cat "$C1/penelope-lab/${YESTERDAY}.txt")
          [ -n "$NJ" ] || [ -n "$PEN" ] && SEED="${NJ} ${PEN}"
        fi
        [ -z "$SEED" ] && SEED=$(cat "$C1/genesis.txt")

        echo "$SEED" > "$C1/seed/${DATESTAMP}.txt"
        echo "=== Seed ===" && cat "$C1/seed/${DATESTAMP}.txt"

    - name: Generate haiku
      run: |
        C1="cascade/cascade1"
        SEED=$(cat "$C1/seed/${DATESTAMP}.txt")
        RAW=$(echo "$SEED" | ./haiku-src/haiku 2>&1)

        HAIKU=$(echo "$RAW" | sed -n '/d=.*T=/,/debt=/p' | grep -v 'd=' | grep -v 'debt=' | grep -v '^$' | sed 's/^  //' | head -3)
        [ -z "$HAIKU" ] && HAIKU=$(echo "$RAW" | grep '^  [a-z]' | head -3 | sed 's/^  //')

        echo "$HAIKU" > "$C1/haiku-lab/${DATESTAMP}.txt"
        echo "=== Haiku ===" && cat "$C1/haiku-lab/${DATESTAMP}.txt"

    - name: Push
      run: |
        git config user.name "Cascade 1: Haiku"
        git config user.email "haiku@ariannamethod.org"
        git add cascade/cascade1/ || true
        git diff --cached --quiet || git commit -m "cascade1/haiku: ${DATESTAMP}"
        git push || (git pull --rebase origin main && git push) || true
