name: "Cascade 1: Molequla"

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  molequla:
    runs-on: ubuntu-latest
    timeout-minutes: 140
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/molequla
        path: molequla-src

    - uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install deps
      run: sudo apt-get update -qq && sudo apt-get install -y -qq libomp-dev gcc

    - name: Build
      working-directory: molequla-src
      run: CGO_ENABLED=1 go build -o molequla . && ls -lh molequla

    - name: Set date
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        echo "DATESTAMP=$DATESTAMP" >> $GITHUB_ENV

    - name: Evolve (4 elements, 30min each)
      working-directory: molequla-src
      run: |
        C1="../cascade/cascade1"
        RUN_DIR="$C1/molequla-lab/${DATESTAMP}"
        mkdir -p "$RUN_DIR"
        DURATION=30

        for elem in earth air water fire; do
          echo "=== ${elem} ==="
          timeout $((DURATION * 60)) ./molequla --element $elem --evolution > "${RUN_DIR}/${elem}.log" 2>&1 || true
          sync
          LINES=$(wc -l < "${RUN_DIR}/${elem}.log" 2>/dev/null || echo 0)
          echo "${elem}: ${LINES} lines"
        done

        # Clean output for NanoJanus
        for elem in earth air water fire; do
          if [ -f "${RUN_DIR}/${elem}.log" ]; then
            grep -v '^\[' "${RUN_DIR}/${elem}.log" | grep -v '^fatal:' | grep -v '^$' | tail -3
          fi
        done > "${RUN_DIR}/clean_output.txt"
        echo "=== Molequla clean output ==="
        cat "${RUN_DIR}/clean_output.txt"

    - name: Push
      run: |
        git config user.name "Cascade 1: Molequla"
        git config user.email "molequla@ariannamethod.org"
        git add cascade/cascade1/ || true
        git diff --cached --quiet || git commit -m "cascade1/molequla: ${DATESTAMP}"
        git push || (git pull --rebase origin main && git push) || true
