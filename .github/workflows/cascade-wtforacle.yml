name: "Cascade: WTForacle"

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  oracle-speaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/WTForacle
        path: wtf-src

    - uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build WTForacle lib
      working-directory: wtf-src
      run: go build -buildmode=c-shared -o libwtf.so ./cmd/wtf-lib/ && ls -lh libwtf.so

    - name: Cache weights
      uses: actions/cache@v4
      with:
        path: wtf-src/wtfweights
        key: wtforacle-360m-v2-weights

    - name: Download weights
      working-directory: wtf-src
      run: |
        mkdir -p wtfweights
        if [ ! -f wtfweights/wtf360_v2_q4_0.gguf ]; then
          curl -L -o wtfweights/wtf360_v2_q4_0.gguf \
            https://huggingface.co/ataeff/WTForacle/resolve/main/ws360/wtf360_v2_q4_0.gguf
        fi
        ls -lh wtfweights/

    - name: Read cauldron
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || echo "")
        echo "DATESTAMP=$DATESTAMP" >> $GITHUB_ENV
        mkdir -p cascade/cauldron
        CONTEXT=""
        if [ -f "cascade/cauldron/${DATESTAMP}.md" ]; then
          CONTEXT=$(cat "cascade/cauldron/${DATESTAMP}.md")
        elif [ -n "$YESTERDAY" ] && [ -f "cascade/cauldron/${YESTERDAY}.md" ]; then
          CONTEXT=$(cat "cascade/cauldron/${YESTERDAY}.md")
        fi
        if [ -z "$CONTEXT" ]; then
          CONTEXT="Nothing in the cauldron. The organisms are silent. Boring."
        fi
        echo "$CONTEXT" > /tmp/cauldron_context.txt
        echo "Context loaded:"
        head -30 /tmp/cauldron_context.txt

    - name: WTForacle responds
      working-directory: wtf-src
      run: |
        CONTEXT=$(cat /tmp/cauldron_context.txt | head -30 | tr '\n' ' ' | cut -c1-400)
        PROMPT="Here is what is happening in the Arianna Method lab today: ${CONTEXT} --- Give your cynical, reddit-troll commentary. 2-3 sentences max. Be brutal."
        cat > /tmp/wtf_inference.py << 'PYEOF'
        import ctypes, sys, os
        lib = ctypes.CDLL('./libwtf.so')
        lib.wtf_init.restype = ctypes.c_int
        lib.wtf_init.argtypes = [ctypes.c_char_p]
        lib.wtf_generate.restype = ctypes.c_int
        lib.wtf_generate.argtypes = [ctypes.c_char_p, ctypes.c_int, ctypes.c_float, ctypes.c_float, ctypes.c_char_p, ctypes.c_int]
        rc = lib.wtf_init(b'wtfweights/wtf360_v2_q4_0.gguf')
        if rc != 0:
            print('WTForacle init failed', file=sys.stderr)
            sys.exit(1)
        prompt = sys.stdin.read().encode('utf-8')
        buf = ctypes.create_string_buffer(2048)
        n = lib.wtf_generate(prompt, 150, ctypes.c_float(0.9), ctypes.c_float(0.9), buf, 2048)
        print(buf.value.decode('utf-8', errors='replace'))
        lib.wtf_free()
        PYEOF
        RESPONSE=$(echo "$PROMPT" | python3 /tmp/wtf_inference.py 2>&1) || true
        echo "$RESPONSE" > /tmp/wtf_response.txt
        echo "WTForacle says:"
        cat /tmp/wtf_response.txt

    - name: Write to cauldron and wtforacle-lab
      run: |
        mkdir -p cascade/cauldron wtforacle-lab/logs
        CAULDRON="cascade/cauldron/${DATESTAMP}.md"
        if [ ! -f "$CAULDRON" ]; then
          echo "# Cascade - ${DATESTAMP}" > "$CAULDRON"
          echo "" >> "$CAULDRON"
        fi
        echo "" >> "$CAULDRON"
        echo "## wtforacle (14:00 UTC)" >> "$CAULDRON"
        echo "" >> "$CAULDRON"
        cat /tmp/wtf_response.txt >> "$CAULDRON"
        echo "" >> "$CAULDRON"
        cp /tmp/wtf_response.txt "wtforacle-lab/logs/${DATESTAMP}.txt"

    - name: Push
      run: |
        git config user.name "Cascade: WTForacle"
        git config user.email "wtf@ariannamethod.org"
        git add cascade/ wtforacle-lab/ || true
        git diff --cached --quiet || git commit -m "cascade/wtforacle: $(date -u +%Y-%m-%d)" && git push || true
