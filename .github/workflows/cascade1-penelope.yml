name: "Cascade 1: Penelope"

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  penelope:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: ariannamethod/1984
        path: penelope-src

    - name: Set date
      run: |
        DATESTAMP=$(date -u +%Y-%m-%d)
        echo "DATESTAMP=$DATESTAMP" >> $GITHUB_ENV

    - name: Generate 12 words
      run: |
        C1="cascade/cascade1"
        mkdir -p "$C1/penelope-lab"

        if [ ! -f "$C1/haiku-lab/${DATESTAMP}.txt" ]; then
          echo "No haiku yet for ${DATESTAMP}, waiting for Haiku workflow."
          exit 0
        fi

        HAIKU=$(cat "$C1/haiku-lab/${DATESTAMP}.txt" | tr '\n' ' ')
        echo "Input: $HAIKU"

        RAW=$(python3 penelope-src/penelope.py --load penelope-src/weights/penelope.bin "$HAIKU" 2>&1)
        echo "$RAW" > "$C1/penelope-lab/${DATESTAMP}_raw.txt"

        # Extract 12 words from chain output
        WORDS=$(echo "$RAW" | grep -E '^\s+\*?\s*[a-z]' | sed 's/\*//g' | awk '{print $1}' | grep -v 'debt' | grep -v 'destined' | grep -v 'drift' | head -12 | tr '\n' ' ')
        [ -z "$WORDS" ] && WORDS=$(echo "$RAW" | grep -oE '\b[a-z]{3,}\b' | grep -v 'debt' | grep -v 'drift' | head -12 | tr '\n' ' ')

        echo "$WORDS" > "$C1/penelope-lab/${DATESTAMP}.txt"
        echo "=== Penelope 12 words ===" && cat "$C1/penelope-lab/${DATESTAMP}.txt"

    - name: Push
      run: |
        git config user.name "Cascade 1: Penelope"
        git config user.email "penelope@ariannamethod.org"
        git add cascade/cascade1/ || true
        git diff --cached --quiet || git commit -m "cascade1/penelope: ${DATESTAMP}"
        git push || (git pull --rebase origin main && git push) || true
